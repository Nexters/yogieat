services:
  # Development Client
  client-dev:
    image: rookieanddocker/yogieat-client:latest
    container_name: yogieat-client-dev
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - yogieat-dev-network
    labels:
      - "name=client-dev"
      - "mode=development"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Production Client
  client-prod:
    image: rookieanddocker/yogieat-client:latest
    container_name: yogieat-client-prod
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - yogieat-prod-network
    labels:
      - "name=client-prod"
      - "mode=production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Unified Nginx (양쪽 네트워크 모두 연결)
  nginx:
    image: rookieanddocker/yogieat-nginx:latest
    container_name: yogieat-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - client-dev
      - client-prod
    networks:
      - yogieat-dev-network
      - yogieat-prod-network
    labels:
      - "name=nginx"
      - "mode=unified"
    restart: on-failure

networks:
  yogieat-dev-network:
    driver: bridge
  yogieat-prod-network:
    driver: bridge
